  // ===== 查重 =====
  async openDuplicateCheck() {
    const modal = document.getElementById('duplicate-modal');
    const body = document.getElementById('duplicate-body');
    modal.classList.remove('hidden');
    UI._lockScroll();

    body.innerHTML = '<div class="loading">正在分析文章……</div>';

    try {
      const articles = await DB.getAllArticles();
      if (!articles || articles.length < 2) {
        body.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>至少需要 2 篇文章才能查重</p></div>`;
        return;
      }

      // 两两计算相似度
      const pairs = [];
      for (let i = 0; i < articles.length; i++) {
        for (let j = i + 1; j < articles.length; j++) {
          const sim = Utils.similarity(articles[i].content, articles[j].content);
          if (sim > 0.1) { // 只显示 >10% 的结果
            pairs.push({
              a: articles[i], b: articles[j],
              sim, level: sim > 0.6 ? 'high' : sim > 0.3 ? 'mid' : 'low'
            });
          }
        }
      }
      pairs.sort((a, b) => b.sim - a.sim);
      this._dupPairs = pairs;
      this._renderDupResults();
    } catch (err) {
      body.innerHTML = `<p style="color:var(--danger)">加载失败: ${err.message}</p>`;
    }
  },

  _renderDupResults() {
    const body = document.getElementById('duplicate-body');
    const pairs = this._dupPairs;
    if (!pairs || pairs.length === 0) {
      body.innerHTML = `<div class="empty-state"><div class="icon">✅</div><p>没有发现重复文章</p></div>`;
      return;
    }
    let html = `<div class="dup-result">
      <p style="margin-bottom:12px;color:var(--text-secondary);font-size:14px">
        共检测到 <b style="color:var(--danger)">${pairs.length}</b> 对可能存在重复
      </p>`;
    for (const p of pairs) {
      const pct = Math.round(p.sim * 100);
      html += `<div class="dup-pair ${p.level === 'high' ? 'high' : ''}">
        <span class="dup-pair-title" title="${this._escapeHtml(p.a.title)}">${this._escapeHtml(p.a.title)}</span>
        <svg width="20" height="20" viewBox="0 0 20 20" style="flex-shrink:0"><path d="M2 10h16M10 2l8 8-8 8" stroke="var(--text-secondary)" stroke-width="2" fill="none"/></svg>
        <span class="dup-pair-title" title="${this._escapeHtml(p.b.title)}">${this._escapeHtml(p.b.title)}</span>
        <div class="dup-bar-wrap"><div class="dup-bar" style="width:${pct}%"></div><div class="dup-bar-text">${pct}%</div></div>
        <button class="btn btn-sm btn-danger" data-action="dup-delete" data-id="${p.a.id}" style="font-size:12px;padding:4px 10px;flex-shrink:0">删左</button>
        <button class="btn btn-sm btn-danger" data-action="dup-delete" data-id="${p.b.id}" style="font-size:12px;padding:4px 10px;flex-shrink:0">删右</button>
      </div>`;
    }
    html += '</div>';
    body.innerHTML = html;
  },

  closeDuplicateCheck() {
    document.getElementById('duplicate-modal').classList.add('hidden');
    this._unlockScroll();
  },

  // ===== 历史记录 =====
  async openHistoryView() {
    const modal = document.getElementById('history-modal');
    const body = document.getElementById('history-body');
    modal.classList.remove('hidden');
    UI._lockScroll();
    body.innerHTML = '<div class="loading">加载中...</div>';

    try {
      let entries;
      if (App.isGH) {
        entries = App._ghHistory || [];
      } else {
        entries = await DB.getHistory();
      }
      if (!entries || entries.length === 0) {
        body.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>暂无浏览记录</p></div>`;
        return;
      }

      // 按时间倒序
      entries.sort((a, b) => new Date(b.viewedAt) - new Date(a.viewedAt));

      this._historyEntries = entries;
      this._historyPage = 1;
      this._renderHistoryPage();
    } catch (err) {
      body.innerHTML = `<p style="color:var(--danger)">加载失败: ${err.message}</p>`;
    }
  },

  _renderHistoryPage() {
    const entries = this._historyEntries;
    if (!entries || entries.length === 0) return;
    const totalPages = Math.max(1, Math.ceil(entries.length / this._historyPageSize));
    if (this._historyPage > totalPages) this._historyPage = totalPages;
    const start = (this._historyPage - 1) * this._historyPageSize;
    const pageItems = entries.slice(start, start + this._historyPageSize);

    const action = App.isGH ? 'gh-read' : 'open-article';
    let html = '<div class="history-list">';
    for (const h of pageItems) {
      const time = Utils.formatDate(h.viewedAt);
      html += `<div class="history-entry" data-action="${action}" data-id="${h.id}">
        <span class="title">${this._escapeHtml(h.title)}</span>
        <span class="time">${time}</span>
      </div>`;
    }
    html += '</div>';

    // 分页控件
    if (totalPages > 1) {
      html += '<div class="pagination" style="margin-top:12px">';
      html += `<button class="page-btn${this._historyPage<=1?' disabled':''}" data-action="history-page" data-page="${this._historyPage-1}">‹</button>`;
      for (let p = 1; p <= totalPages; p++) {
        html += `<button class="page-btn${p===this._historyPage?' active':''}" data-action="history-page" data-page="${p}">${p}</button>`;
      }
      html += `<button class="page-btn${this._historyPage>=totalPages?' disabled':''}" data-action="history-page" data-page="${this._historyPage+1}">›</button>`;
      html += '</div>';
    }

    document.getElementById('history-body').innerHTML = html;
  },

  closeHistoryView() {
    document.getElementById('history-modal').classList.add('hidden');
    this._unlockScroll();
  }
};

// ===== 主应用 =====
const App = {
  currentTab: 'articles',
  isGH: false,
  _ghArticles: [],
  _ghHistory: [],
  _ghPage: 1,
  _ghPageSize: 12,

  async init() {
    const host = window.location.hostname;
    const isLocal = host === 'localhost' || host === '127.0.0.1' || window.location.protocol === 'file:';
    this.isGH = !isLocal;

    // === 所有模式都需要的事件绑定 ===
    document.addEventListener('click', (e) => {
      const el = e.target.closest('[data-action]');
      if (!el) return;
      const action = el.dataset.action;
      this.handleAction(action, el, e);
    });

    document.addEventListener('click', (e) => {
      const btn = e.target.closest('.remove-img');
      if (!btn) return;
      if (btn.dataset.removeExisting !== undefined) {
        const idx = parseInt(btn.dataset.removeExisting);
        if (!isNaN(idx) && UI._editorExistingImages) {
          UI._editorExistingImages.splice(idx, 1);
          UI._renderEditorPreviews();
        }
      } else if (btn.dataset.removeNew !== undefined) {
        const idx = parseInt(btn.dataset.removeNew);
        if (!isNaN(idx) && UI._editorNewFiles) {
          UI._editorNewFiles.splice(idx, 1);
          UI._renderEditorPreviews();
        }
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (!document.getElementById('article-detail-modal').classList.contains('hidden')) {
          UI.closeArticleDetail();
        } else if (!document.getElementById('article-editor-modal').classList.contains('hidden')) {
          UI.closeArticleEditor();
        } else if (!document.getElementById('history-modal').classList.contains('hidden')) {
          UI.closeHistoryView();
        }
      }
    });

    document.querySelectorAll('.modal-overlay').forEach(m => {
      m.addEventListener('click', (e) => {
        if (e.target === m) {
          if (m.id === 'article-detail-modal') UI.closeArticleDetail();
          else if (m.id === 'article-editor-modal') UI.closeArticleEditor();
          else if (m.id === 'duplicate-modal') UI.closeDuplicateCheck();
          else if (m.id === 'history-modal') UI.closeHistoryView();
        }
      });
    });

    if (this.isGH) {
      return this._initGHPages();
    }

    // === 本地编辑模式 ===

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    // Try to restore folder handle
    FolderManager.init().then(ok => {
      if (ok) {
        const btn = document.getElementById('folder-btn');
        if (btn) btn.textContent = '📂';
      }
    });

    // File input change handler
    // Ctrl+V 粘贴图片
    document.getElementById('article-content-input').addEventListener('paste', async (e) => {
      const ta = e.target;
      const caretStart = ta.selectionStart;
      const caretEnd = ta.selectionEnd;
      const before = ta.value.slice(0, caretStart);
      const after = ta.value.slice(caretStart);

      try {
        const items = Array.from(e.clipboardData.items || []);
        const files = Array.from(e.clipboardData.files || []);
        const html = e.clipboardData.getData('text/html');

        // === 阶段1：同步遍历 DOM，收集顺序化的片段 ===
        // 每个片段: { type:'text', text } 或 { type:'img', src, isDataUri }
        const segments = [];
        let hasImages = false;

        if (html) {
          const doc = new DOMParser().parseFromString(html, 'text/html');
          (function walk(n) {
            if (n.nodeType === 3) { segments.push({ type: 'text', text: n.textContent }); return; }
            if (n.nodeType !== 1) return;
            const tag = n.tagName.toLowerCase();
            if (tag === 'img') {
              const src = n.getAttribute('src') || '';
              const isDataUri = src.startsWith('data:image/');
              segments.push({ type: 'img', src, isDataUri });
              hasImages = true;
              return;
            }
            if (tag === 'br') { segments.push({ type: 'text', text: '\n' }); return; }
            const block = new Set(['p','div','h1','h2','h3','h4','h5','h6','li','blockquote','hr','tr']);
            if (block.has(tag) && segments.length && segments[segments.length-1].type==='text') {
              const t = segments[segments.length-1].text;
              if (t && !t.endsWith('\n')) segments[segments.length-1].text += '\n';
            }
            Array.from(n.childNodes).forEach(walk);
            if (block.has(tag)) segments.push({ type: 'text', text: '\n' });
          })(doc.body);
        }

        // === 阶段2：处理剪贴板独立图片（截图） ===
        const pasteImages = []; // 按顺序收集的图片 Blob
        let textPaste = '';

        // 处理 HTML 片段中的图片（异步下载）
        let imgSeq = 0;
        for (const seg of segments) {
          if (seg.type === 'text') {
            textPaste += seg.text;
          } else if (seg.type === 'img') {
            if (seg.isDataUri) {
              // 立即解码 base64
              const m = seg.src.match(/^data:image\/(\w+);base64,(.+)$/);
              if (m) {
                try {
                  const bin = atob(m[2]), arr = new Uint8Array(bin.length);
                  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
                  const blob = new Blob([arr], { type: `image/${m[1]}` });
                  if (blob.size > 0) { pasteImages.push(blob); textPaste += '[图片]'; }
                } catch(e) { textPaste += '[图片缺失]'; }
              }
            } else if (seg.src.match(/^https?:\/\//)) {
              // 尝试下载外部图片
              try {
                const resp = await fetch(seg.src, { mode: 'cors', signal: AbortSignal.timeout(2000) });
                if (resp.ok) {
                  const blob = await resp.blob();
                  if (blob.type.startsWith('image/')) { pasteImages.push(blob); textPaste += '[图片]'; }
                  else textPaste += '[图片缺失]';
                } else { textPaste += '[图片缺失]'; }
              } catch(e) { textPaste += '[图片缺失]'; }
            } else {
              // 无法识别的 src
              textPaste += '[图片缺失]';
            }
            imgSeq++;
          }
        }

        // 处理剪贴板 items/files（截图等），追加到末尾
        const clipboardImages = [];
        for (const item of items) {
          if (item.type.startsWith('image/')) {
            const f = item.getAsFile();
            if (f) clipboardImages.push(f);
          }
        }
        for (const f of files) {
          if (f.type.startsWith('image/') && !clipboardImages.some(c => c.size === f.size)) {
            clipboardImages.push(f);
          }
        }

        // 如果只有剪贴板图片（没有 HTML），也用它们的文字
        const plainText = e.clipboardData.getData('text') || '';
        if (!html && clipboardImages.length > 0) {
          textPaste = plainText;
          for (const f of clipboardImages) { textPaste += '\n[图片]'; pasteImages.push(f); }
          hasImages = true;
        } else if (clipboardImages.length > 0) {
          for (const f of clipboardImages) { textPaste += '\n[图片]'; pasteImages.push(f); }
          hasImages = true;
        }

        if (!hasImages || pasteImages.length === 0) return; // 没有图片
        e.preventDefault();

        // 清理多余空白
        textPaste = textPaste.replace(/\n{3,}/g, '\n\n').trim();

        // 插入文本
        ta.value = before + textPaste + after;
        ta.selectionStart = ta.selectionEnd = caretStart + textPaste.length;
        ta.dispatchEvent(new Event('input', { bubbles: true }));

        // 文件夹检查
        if (!Array.isArray(UI._editorNewFiles)) UI._editorNewFiles = [];
        if (!(await FolderManager.hasFolder())) {
          try {
            const picked = await FolderManager.pickFolder();
            if (!picked) return;
          } catch (err) { UI.showToast('请先选择图片存储文件夹', 'error'); return; }
        }

        // 处理图片
        let count = 0;
        for (const blob of pasteImages) {
          if (!blob) continue;
          const errors = ImageManager.validate([blob]);
          if (errors.length > 0) { UI.showToast(errors.join('；'), 'error'); continue; }
          const compressed = await ImageManager.compress(blob);
          UI._editorNewFiles.push(compressed);
          count++;
        }
        UI._renderEditorPreviews();
        if (count > 0) UI.showToast(`已粘贴 ${count} 张图片`, 'success');
      } catch (err) {
        console.error('粘贴失败:', err);
        UI.showToast('粘贴失败', 'error');
      }
    });

    // (Escape and modal overlay are bound above for all modes)

    // Render initial view
    this.switchTab('articles');
  },

  // === GitHub Pages 只读模式 ===
  async _initGHPages() {
    // 隐藏编辑控制
    document.getElementById('fab').classList.add('hidden');
    document.querySelectorAll('[data-action="add-article"],[data-action="delete-article"],[data-action="edit-article"]')
      .forEach(el => el.style.display = 'none');
    document.querySelectorAll('.header-btn[data-action="export-data"],.header-btn[data-action="import-data"],.header-btn[data-action="pick-folder"]')
      .forEach(el => el.style.display = 'none');
    // 隐藏签到标签
    document.querySelector('[data-tab="checkin"]')?.remove();

    try {
      const resp = await fetch('data/data.json?_=' + Date.now());
      if (!resp.ok) throw new Error('Not found');
      this._ghArticles = await resp.json();
      if (!this._ghArticles.articles) throw new Error('Invalid data');
    } catch (e) {
      document.getElementById('main-content').innerHTML =
        `<div class="empty-state"><div class="icon">📚</div><p style="font-size:16px">薰陶法</p><p style="font-size:14px;color:var(--text-secondary);margin-top:8px">暂无数据，请在本地编辑后同步到 GitHub</p></div>`;
      return;
    }

    // 恢复浏览历史
    try { this._ghHistory = JSON.parse(localStorage.getItem('gh_history') || '[]'); } catch(e) {}

    this.currentTab = 'articles';
    App._renderGHList();
  },

  _renderGHList() {
    const main = document.getElementById('main-content');
    const data = this._ghArticles;
    if (!data || !data.articles || data.articles.length === 0) {
      main.innerHTML = `<div class="empty-state"><div class="icon">📚</div><p>暂无文章</p></div>`;
      return;
    }
    const all = data.articles.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
    const totalPages = Math.max(1, Math.ceil(all.length / this._ghPageSize));
    if (this._ghPage > totalPages) this._ghPage = totalPages;
    const start = (this._ghPage - 1) * this._ghPageSize;
    const pageItems = all.slice(start, start + this._ghPageSize);

    let html = `<div class="random-section"><button class="random-btn" data-action="random-pick"><span class="icon">🎲</span> 随机一篇</button></div>
    <div style="text-align:center;font-size:13px;color:var(--text-secondary);margin-bottom:12px">共 ${all.length} 篇文章</div>
    <div class="article-list">`;
    for (const a of pageItems) {
      const date = Utils.formatDate(a.createdAt);
      const excerpt = Utils.truncate(a.content, 100);
      html += `<div class="article-card" data-id="${a.id}">
        <div class="card-body">
          <div class="card-title">${UI._escapeHtml(a.title)}</div>
          <div class="card-excerpt">${UI._escapeHtml(excerpt)}</div>
          <div class="card-meta"><span>${date}</span>
            <button class="btn btn-secondary" data-action="gh-read" data-id="${a.id}">阅读</button>
          </div>
        </div>
      </div>`;
    }
    html += '</div>';

    // 分页控件
    if (totalPages > 1) {
      html += '<div class="pagination" style="padding-bottom:20px">';
      html += `<button class="page-btn${this._ghPage<=1?' disabled':''}" data-action="gh-page" data-page="${this._ghPage-1}">‹</button>`;
      for (let p = 1; p <= totalPages; p++) {
        html += `<button class="page-btn${p===this._ghPage?' active':''}" data-action="gh-page" data-page="${p}">${p}</button>`;
      }
      html += `<button class="page-btn${this._ghPage>=totalPages?' disabled':''}" data-action="gh-page" data-page="${this._ghPage+1}">›</button>`;
      html += '</div>';
    }

    main.innerHTML = html;
    document.getElementById('fab')?.classList.add('hidden');
  },

  _renderGHDetail(id) {
    const article = this._ghArticles.articles.find(a => a.id === id);
    if (!article) { UI.showToast('文章不存在', 'error'); return; }
    const modal = document.getElementById('article-detail-modal');
    const titleEl = document.getElementById('detail-title');
    const bodyEl = document.getElementById('detail-body');
    document.getElementById('detail-edit-btn').style.display = 'none';
    document.getElementById('detail-delete-btn').style.display = 'none';

    // 记录浏览历史
    this._ghHistory = this._ghHistory.filter(h => h.id !== article.id);
    this._ghHistory.push({ id: article.id, title: article.title, viewedAt: new Date().toISOString() });
    if (this._ghHistory.length > 50) this._ghHistory.shift();
    try { localStorage.setItem('gh_history', JSON.stringify(this._ghHistory)); } catch(e) {}

    bodyEl.innerHTML = '<div class="loading">加载中...</div>';
    modal.classList.remove('hidden');
    UI._lockScroll();
    titleEl.textContent = article.title;

    let html = `<div class="detail-date">${Utils.formatDate(article.createdAt)}</div>`;

    // 内联渲染带 [图片] 标记的内容
    const content = article.content || '';
    const images = article.images || [];
    if (content.includes('[图片]') && images.length > 0) {
      const parts = content.split('[图片]');
      html += '<div class="detail-text">';
      for (let i = 0; i < parts.length; i++) {
        html += UI._escapeHtml(parts[i]);
        if (i < images.length) {
          const img = images[i];
          if (typeof img === 'object' && img.data) {
            html += `<img src="${img.data}" alt="文章图片" style="margin:12px 0;border-radius:8px;max-width:100%" loading="lazy">`;
          } else if (typeof img === 'string') {
            const url = img.startsWith('http') ? img : `data/images/${img}`;
            html += `<img src="${url}" alt="文章图片" style="margin:12px 0;border-radius:8px;max-width:100%" loading="lazy" onerror="this.style.display='none'">`;
          }
        }
      }
      html += '</div>';
    } else if (images.length > 0) {
      for (const img of images) {
        if (typeof img === 'object' && img.data) {
          html += `<img src="${img.data}" alt="文章图片" style="margin:12px 0;border-radius:8px;max-width:100%" loading="lazy">`;
        } else if (typeof img === 'string') {
          const url = img.startsWith('http') ? img : `data/images/${img}`;
          html += `<img src="${url}" alt="文章图片" style="margin:12px 0;border-radius:8px;max-width:100%" loading="lazy" onerror="this.style.display='none'">`;
        }
      }
      html += `<div class="detail-text">${UI._escapeHtml(content)}</div>`;
    } else {
      html += `<div class="detail-text">${UI._escapeHtml(content)}</div>`;
    }

    bodyEl.innerHTML = html;
  },

  async syncData() {
    try {
      const articles = await DB.getAllArticles();
      const checkins = await DB.getCheckinData();
      const exported = { version: 2, exportedAt: new Date().toISOString(), articles: [], checkins };

      for (const a of articles) {
        const imageNames = [];
        if (a.images && a.images.length > 0) {
          for (const img of a.images) {
            if (typeof img === 'string') imageNames.push(img);
            else if (img instanceof Blob) imageNames.push(img.name || 'image.jpg');
          }
        }
        exported.articles.push({
          id: a.id, title: a.title, content: a.content,
          images: imageNames,
          createdAt: a.createdAt, updatedAt: a.updatedAt
        });
      }

      const json = JSON.stringify(exported, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'data.json';
      a.click();
      URL.revokeObjectURL(url);
      const n = exported.articles.length;
      UI.showToast(`已生成 data.json（${n} 篇文章），请放入 data/ 目录后 git push`, 'success');
    } catch (err) {
      UI.showToast('同步失败: ' + err.message, 'error');
    }
  },

  handleAction(action, el, e) {
    switch (action) {
      case 'switch-tab':
        this.switchTab(el.dataset.tab);
        break;
      case 'add-article':
        UI.openArticleEditor();
        break;
      case 'random-pick':
        this.randomPick();
        break;
      case 'open-article':
        UI.openArticleDetail(el.dataset.id);
        break;
      case 'edit-article':
        UI.closeArticleDetail();
        UI.openArticleEditor(el.dataset.id);
        break;
      case 'delete-article':
        this.deleteArticle(el.dataset.id);
        break;
      case 'save-article':
        this.saveArticle();
        break;
      case 'close-detail':
        UI.closeArticleDetail();
        break;
      case 'close-editor':
        UI.closeArticleEditor();
        break;
      case 'checkin':
        this.doCheckin();
        break;
      case 'pick-folder':
        this.pickFolder();
        break;
      case 'prev-month':
        UI.navigateMonth(-1);
        break;
      case 'next-month':
        UI.navigateMonth(1);
        break;
      case 'open-duplicate':
        UI.openDuplicateCheck();
        break;
      case 'close-duplicate':
        UI.closeDuplicateCheck();
        break;
      case 'export-data':
        this.exportData();
        break;
      case 'import-data':
        this.importData();
        break;
      case 'sync-data':
        this.syncData();
        break;
      case 'gh-read':
        this._renderGHDetail(el.dataset.id);
        break;
      case 'gh-page':
        this._ghPage = parseInt(el.dataset.page);
        this._renderGHList();
        break;
      case 'history-page':
        UI._historyPage = parseInt(el.dataset.page);
        UI._renderHistoryPage();
        break;
      case 'page':
        UI._page = parseInt(el.dataset.page);
        UI.renderArticleList();
        break;
      case 'open-history':
        UI.openHistoryView();
        break;
      case 'close-history':
        UI.closeHistoryView();
        break;
      case 'clear-history':
        this.clearHistory();
        break;
      case 'clear-search':
        UI._searchKeyword = '';
        UI._page = 1;
        UI.renderArticleList();
        break;
      case 'sort-articles':
        UI._sortBy = el.dataset.sort;
        UI.renderArticleList();
        break;
      case 'dup-delete':
        this.dupDelete(el.dataset.id);
        break;
    }
  },

  switchTab(tab) {
    this.currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.tab === tab);
    });
    if (tab === 'articles') {
      UI.renderArticleList();
    } else {
      UI.renderCheckinView();
    }
  },

  async randomPick() {
    if (this.isGH) {
      const articles = (this._ghArticles?.articles || []).filter(
        a => !this._ghHistory.some(h => h.id === a.id)
      );
      if (articles.length === 0) {
        UI.showToast('已看过所有文章，请清空浏览历史', 'info'); return;
      }
      const a = articles[Math.floor(Math.random() * articles.length)];
      UI.showToast('🎲 抽到一篇！', 'success');
      setTimeout(() => this._renderGHDetail(a.id), 300);
      return;
    }
    try {
      const article = await DB.getRandomArticle();
      if (!article) {
        UI.showToast('还没有文章，请先添加', 'info');
        return;
      }
      UI.showToast('🎲 抽到一篇！', 'success');
      setTimeout(() => UI.openArticleDetail(article.id), 300);
    } catch (err) {
      UI.showToast('抽取失败: ' + err.message, 'error');
    }
  },

  async deleteArticle(id) {
    if (!confirm('确定删除这篇文章吗？')) return;
    try {
      // 先清理文件夹中的图片
      const article = await DB.getArticle(id);
      if (article && article.images) {
        for (const img of article.images) {
          if (typeof img === 'string') {
            await FolderManager.deleteImage(img);
          }
        }
      }
      await DB.deleteArticle(id);
      UI.showToast('已删除', 'success');
      UI.closeArticleDetail();
      if (this.currentTab === 'articles') {
        UI.renderArticleList();
      }
    } catch (err) {
      UI.showToast('删除失败: ' + err.message, 'error');
    }
  },

  async saveArticle() {
    const title = document.getElementById('article-title-input').value.trim();
    const content = document.getElementById('article-content-input').value.trim();
    const editId = document.getElementById('edit-article-id').value;
    const existingImages = UI._editorExistingImages || [];
    const newFiles = UI._editorNewFiles || [];

    if (!title) {
      UI.showToast('请输入文章标题', 'error');
      return;
    }
    if (!content) {
      UI.showToast('请输入文章正文', 'error');
      return;
    }

    // 有新增图片时必须先设置文件夹
    if (newFiles.length > 0 && !(await FolderManager.hasFolder())) {
      UI.showToast('请先选择图片存储文件夹', 'error');
      return;
    }

    const btn = document.getElementById('editor-save-btn');
    btn.disabled = true;
    btn.textContent = '保存中...';

    try {
      // 构建最终图片文件名数组
      const imageFilenames = [];

      // 处理已有的图片（字符串=已在文件夹中，Blob=旧格式需迁移）
      const needFolder = newFiles.length > 0 || await FolderManager.hasFolder();
      for (const img of existingImages) {
        if (typeof img === 'string') {
          imageFilenames.push(img);
        } else if (img instanceof Blob && needFolder) {
          const fn = await FolderManager.saveImage(img, 'image.jpg');
          imageFilenames.push(fn);
        } else if (img instanceof Blob) {
          imageFilenames.push(img); // 保持向后兼容
        }
      }

      // 处理新增图片
      for (const blob of newFiles) {
        const fn = await FolderManager.saveImage(blob, 'image.jpg');
        imageFilenames.push(fn);
      }

      // 处理被删除的图片（编辑模式下清理文件夹中的文件）
      if (editId) {
        const oldArticle = await DB.getArticle(editId);
        if (oldArticle && oldArticle.images) {
          for (const oldImg of oldArticle.images) {
            if (typeof oldImg === 'string' && !imageFilenames.includes(oldImg)) {
              await FolderManager.deleteImage(oldImg);
            }
          }
        }
      }

      // 根据 [图片] 标记数量裁剪图片数组
      const markerCount = (content.match(/\[图片\]/g) || []).length;
      while (imageFilenames.length > markerCount) {
        const extra = imageFilenames.pop();
        if (typeof extra === 'string') await FolderManager.deleteImage(extra);
      }

      if (editId) {
        const existing = await DB.getArticle(editId);
        if (!existing) {
          UI.showToast('文章已不存在', 'error');
          btn.disabled = false;
          btn.textContent = '保存';
          return;
        }
        const article = { ...existing, title, content, images: imageFilenames };
        await DB.updateArticle(article);
        UI.showToast('已更新', 'success');
      } else {
        const article = { title, content, images: imageFilenames };
        await DB.addArticle(article);
        UI.showToast('已添加', 'success');
      }

      UI.closeArticleEditor();
      if (this.currentTab === 'articles') {
        UI.renderArticleList();
      }
    } catch (err) {
      UI.showToast('保存失败: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '保存';
    }
  },

  async doCheckin() {
    const btn = document.querySelector('.checkin-btn');
    if (btn && btn.classList.contains('checked')) {
      UI.showToast('今日已签到', 'info');
      return;
    }

    try {
      const result = await DB.doCheckin();
      if (result.ok) {
        UI.showToast(`✅ 签到成功！连续 ${result.streak} 天`, 'success');
        UI.renderCheckinView();
        UI.updateStreakBadge();
      } else {
        UI.showToast('今日已签到', 'info');
        UI.renderCheckinView();
      }
    } catch (err) {
      UI.showToast('签到失败: ' + err.message, 'error');
    }
  },

  async clearHistory() {
    if (!confirm('确定清空所有浏览记录？')) return;
    if (this.isGH) {
      this._ghHistory = [];
      localStorage.removeItem('gh_history');
    } else {
      await DB.clearHistory();
    }
    UI.closeHistoryView();
    UI.showToast('历史已清空', 'success');
  },

  async dupDelete(id) {
    if (!confirm('确定删除这篇文章？')) return;
    try {
      const article = await DB.getArticle(id);
      if (article && article.images) {
        for (const img of article.images) {
          if (typeof img === 'string') await FolderManager.deleteImage(img);
        }
      }
      await DB.deleteArticle(id);
      UI.showToast('已删除', 'success');
      // 从缓存中移除已删除的文章，不重新扫描
      UI._dupPairs = UI._dupPairs.filter(p => p.a.id !== id && p.b.id !== id);
      UI._renderDupResults();
      if (this.currentTab === 'articles') UI.renderArticleList();
    } catch (err) {
      UI.showToast('删除失败: ' + err.message, 'error');
    }
  },

  async exportData() {
    try {
      const articles = await DB.getAllArticles();
      const checkins = await DB.getCheckinData();
      const exported = { version: 2, exportedAt: new Date().toISOString(), articles: [], checkins };

      for (const a of articles) {
        // 只存图片文件名，不存图片数据
        const imageNames = [];
        if (a.images && a.images.length > 0) {
          for (const img of a.images) {
            if (typeof img === 'string') imageNames.push(img);
            else if (img instanceof Blob) imageNames.push(img.name || 'image.jpg');
          }
        }
        exported.articles.push({
          id: a.id, title: a.title, content: a.content,
          images: imageNames,
          createdAt: a.createdAt, updatedAt: a.updatedAt
        });
      }

      const json = JSON.stringify(exported, null, 2);
      // 大文件分段下载
      const chunkSize = 5 * 1024 * 1024; // 5MB
      if (json.length > chunkSize) {
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `薰陶法_${Utils.formatDateShort(new Date())}.json`;
        a.click();
        URL.revokeObjectURL(url);
      } else {
        const url = URL.createObjectURL(new Blob([json], { type: 'application/json' }));
        const a = document.createElement('a');
        a.href = url; a.download = `薰陶法_${Utils.formatDateShort(new Date())}.json`;
        a.click();
        URL.revokeObjectURL(url);
      }
      const n = exported.articles.length;
      UI.showToast(`${n} 篇文章已导出。（请将整个文件夹复制到新电脑）`, 'success');
    } catch (err) {
      UI.showToast('导出失败: ' + err.message, 'error');
    }
  },

  async importData() {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.json';
    input.click();
    const file = await new Promise(resolve => { input.onchange = (e) => resolve(e.target.files[0]); });
    if (!file) return;

    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!data.version || !data.articles) { UI.showToast('无效的导出文件', 'error'); return; }

      const hasImages = data.articles.some(a => a.images && a.images.length > 0);

      // 如果有图片，让用户选择图片文件夹
      if (hasImages) {
        if (!(await FolderManager.hasFolder())) {
          try {
            UI.showToast('请选择存放图片的文件夹', 'info');
            const picked = await FolderManager.pickFolder();
            if (!picked) return;
          } catch (e) { UI.showToast('请先选择图片存储文件夹', 'error'); return; }
        } else {
          UI.showToast('已检测到图片文件夹', 'info');
        }
      }

      // 分批导入（每批 10 篇，避免事务超时）
      const batchSize = 10;
      for (let i = 0; i < data.articles.length; i += batchSize) {
        const batch = data.articles.slice(i, i + batchSize);
        await Promise.all(batch.map(item => {
          const images = (item.images || []).filter(f => typeof f === 'string');
          return DB.addArticle({
            id: item.id, title: item.title, content: item.content,
            images,
            createdAt: item.createdAt, updatedAt: item.updatedAt
          }).catch(() => {
            // 如果 ID 冲突则更新
            return DB.updateArticle({
              id: item.id, title: item.title, content: item.content,
              images,
              createdAt: item.createdAt, updatedAt: item.updatedAt
            });
          });
        }));
      }

      if (data.checkins) await DB.saveCheckinData(data.checkins);

      UI.showToast(`导入成功（${data.articles.length} 篇文章）`, 'success');
      if (this.currentTab === 'articles') UI.renderArticleList();
      else this.switchTab('articles');
    } catch (err) {
      UI.showToast('导入失败: ' + err.message, 'error');
    }
  },

  async pickFolder() {
    try {
      const picked = await FolderManager.pickFolder();
      if (picked) {
        UI.showToast('图片存储文件夹已设置 ✅', 'success');
      }
    } catch (err) {
      UI.showToast('选择文件夹失败: ' + err.message, 'error');
    }
  }
};

// 启动应用
document.addEventListener('DOMContentLoaded', () => {
  App.init();
});
</script>
